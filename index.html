<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belinda Calc Pro 💃✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/13.2.0/math.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ec4899">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display:wght@700&display=swap');
        
        :root {
            --primary: #ec4899;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
        }
        .title {
            font-family: 'Playfair Display', cursive;
        }
        
        .display {
            font-size: clamp(2rem, 8vw, 3.5rem);
            background: linear-gradient(135deg, #4c1d95, #831843);
            min-height: 88px;
        }
        
        .btn {
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: clamp(1.1rem, 4.5vw, 1.35rem);
        }
        
        .btn:active {
            transform: scale(0.88) rotate(8deg);
            box-shadow: 0 0 0 10px rgba(236, 72, 153, 0.25);
        }
        
        .scientific-btn {
            font-size: clamp(0.95rem, 3.8vw, 1.1rem);
            background-color: #f3e8ff;
        }
        
        .graph-container {
            height: 280px;
            background: #f8fafc;
            border-radius: 24px;
            padding: 12px;
        }
        
        @media (orientation: landscape) and (max-height: 500px) {
            .graph-container {
                height: 200px;
            }
            .calculator-grid {
                grid-template-columns: repeat(8, minmax(0, 1fr)) !important;
            }
        }
        
        .sparkle {
            animation: sparkle 1.8s infinite;
        }
        
        @keyframes sparkle {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-200 via-purple-200 to-violet-300 min-h-screen">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl border-x-4 border-pink-400">
        <!-- Header -->
        <div class="bg-gradient-to-r from-pink-500 to-purple-600 text-white p-5 flex items-center gap-4 sticky top-0 z-10">
            <div class="w-12 h-12 bg-white rounded-3xl flex items-center justify-center text-4xl sparkle flex-shrink-0">💃</div>
            <div class="min-w-0">
                <h1 class="title text-3xl font-bold tracking-tighter">Belinda Calc Pro</h1>
                <p class="text-pink-100 text-sm opacity-90">v1.2.0 • Scientific + Graphs • Mobile First</p>
            </div>
        </div>

        <!-- Display -->
        <div class="px-6 pt-6 pb-2 bg-gradient-to-b from-slate-900 to-black">
            <div id="display" 
                 class="display rounded-3xl p-6 text-right text-white font-mono shadow-inner border border-pink-400 flex items-center justify-end overflow-hidden">
                0
            </div>
            <div id="expression" class="text-right text-pink-300 text-sm mt-3 font-light h-6"></div>
        </div>

        <!-- Main Calculator -->
        <div class="p-5 bg-white">
            <div class="calculator-grid grid grid-cols-4 gap-2.5">
                <!-- Scientific row (always visible) -->
                <button onclick="handleScientific('sin')" class="scientific-btn btn h-11 rounded-2xl text-purple-700 font-medium">sin</button>
                <button onclick="handleScientific('cos')" class="scientific-btn btn h-11 rounded-2xl text-purple-700 font-medium">cos</button>
                <button onclick="handleScientific('tan')" class="scientific-btn btn h-11 rounded-2xl text-purple-700 font-medium">tan</button>
                <button onclick="toggleAngle()" id="angleBtn" class="scientific-btn btn h-11 rounded-2xl text-amber-600 font-bold">DEG</button>
                
                <button onclick="handleScientific('log')" class="scientific-btn btn h-11 rounded-2xl text-purple-700 font-medium">log</button>
                <button onclick="handleScientific('ln')" class="scientific-btn btn h-11 rounded-2xl text-purple-700 font-medium">ln</button>
                <button onclick="handleScientific('sqrt')" class="scientific-btn btn h-11 rounded-2xl text-purple-700 font-medium">√x</button>
                <button onclick="handleScientific('^')" class="scientific-btn btn h-11 rounded-2xl text-purple-700 font-medium">xʸ</button>

                <!-- Main buttons -->
                <button onclick="handleInput('C')" class="btn col-span-1 h-14 text-2xl font-bold bg-red-100 hover:bg-red-200 text-red-600 rounded-3xl">C</button>
                <button onclick="handleInput('(')" class="btn h-14 text-3xl font-semibold bg-slate-100 rounded-3xl">(</button>
                <button onclick="handleInput(')')" class="btn h-14 text-3xl font-semibold bg-slate-100 rounded-3xl">)</button>
                <button onclick="handleInput('/')" class="btn h-14 text-4xl font-bold bg-violet-500 text-white rounded-3xl">÷</button>
                
                <button onclick="handleInput('7')" class="btn h-16 text-4xl font-semibold bg-white border border-slate-200 rounded-3xl active:bg-slate-100">7</button>
                <button onclick="handleInput('8')" class="btn h-16 text-4xl font-semibold bg-white border border-slate-200 rounded-3xl active:bg-slate-100">8</button>
                <button onclick="handleInput('9')" class="btn h-16 text-4xl font-semibold bg-white border border-slate-200 rounded-3xl active:bg-slate-100">9</button>
                <button onclick="handleInput('*')" class="btn h-16 text-4xl font-bold bg-violet-500 text-white rounded-3xl">×</button>
                
                <button onclick="handleInput('4')" class="btn h-16 text-4xl font-semibold bg-white border border-slate-200 rounded-3xl active:bg-slate-100">4</button>
                <button onclick="handleInput('5')" class="btn h-16 text-4xl font-semibold bg-white border border-slate-200 rounded-3xl active:bg-slate-100">5</button>
                <button onclick="handleInput('6')" class="btn h-16 text-4xl font-semibold bg-white border border-slate-200 rounded-3xl active:bg-slate-100">6</button>
                <button onclick="handleInput('-')" class="btn h-16 text-5xl leading-none font-bold bg-violet-500 text-white rounded-3xl">−</button>
                
                <button onclick="handleInput('1')" class="btn h-16 text-4xl font-semibold bg-white border border-slate-200 rounded-3xl active:bg-slate-100">1</button>
                <button onclick="handleInput('2')" class="btn h-16 text-4xl font-semibold bg-white border border-slate-200 rounded-3xl active:bg-slate-100">2</button>
                <button onclick="handleInput('3')" class="btn h-16 text-4xl font-semibold bg-white border border-slate-200 rounded-3xl active:bg-slate-100">3</button>
                <button onclick="handleInput('+')" class="btn h-16 text-4xl font-bold bg-violet-500 text-white rounded-3xl">+</button>
                
                <button onclick="handleInput('0')" class="btn col-span-2 h-16 text-4xl font-semibold bg-white border border-slate-200 rounded-3xl active:bg-slate-100">0</button>
                <button onclick="handleInput('.')" class="btn h-16 text-5xl font-semibold bg-white border border-slate-200 rounded-3xl active:bg-slate-100">.</button>
                <button onclick="calculateResult()" class="btn h-16 text-5xl font-bold bg-gradient-to-br from-pink-500 to-purple-600 text-white rounded-3xl shadow-lg">💖</button>
            </div>
        </div>

        <!-- Graph Section -->
        <div class="px-5 pb-8">
            <div class="bg-slate-50 rounded-3xl p-4 border border-purple-100">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-purple-500 font-medium text-sm">📈 Graph Mode</span>
                    <input id="functionInput" type="text" value="sin(x)" 
                           class="flex-1 mx-4 px-5 py-2.5 text-sm bg-white border border-purple-200 rounded-2xl focus:outline-none focus:border-pink-400 font-mono">
                    <button onclick="plotCurrentFunction()" 
                            class="px-7 py-2 bg-gradient-to-r from-pink-500 to-purple-600 text-white text-sm font-bold rounded-2xl active:scale-95">Plot</button>
                </div>
                <div class="graph-container">
                    <canvas id="graphCanvas" class="w-full h-full"></canvas>
                </div>
            </div>
            <p class="text-center text-[10px] text-purple-400 mt-4">Try: sin(x), x², 2^x, cos(3x)</p>
        </div>

        <div class="text-center py-6 text-[10px] text-purple-300 border-t">
            Belinda Calc Pro v1.2.0 • Made with love, math & glitter 💖
        </div>
    </div>

    <script>
        let displayValue = '0';
        let previousValue = '';
        let operator = '';
        let isDegree = true;
        let chart = null;

        const displayEl = document.getElementById('display');
        const exprEl = document.getElementById('expression');

        function updateDisplay() {
            displayEl.textContent = displayValue;
        }

        function handleInput(val) {
            if (['+', '-', '*', '/', '^'].includes(val)) {
                previousValue = displayValue;
                operator = val;
                exprEl.textContent = `${displayValue} ${val === '*' ? '×' : val === '/' ? '÷' : val}`;
                displayValue = '0';
            } else if (val === 'C') {
                displayValue = '0';
                previousValue = '';
                operator = '';
                exprEl.textContent = '';
            } else {
                if (displayValue === '0' && val !== '.') displayValue = val;
                else displayValue += val;
            }
            updateDisplay();
        }

        function handleScientific(fn) {
            let result;
            try {
                const num = parseFloat(displayValue);
                if (fn === 'sin') result = isDegree ? Math.sin(num * Math.PI / 180) : Math.sin(num);
                else if (fn === 'cos') result = isDegree ? Math.cos(num * Math.PI / 180) : Math.cos(num);
                else if (fn === 'tan') result = isDegree ? Math.tan(num * Math.PI / 180) : Math.tan(num);
                else if (fn === 'log') result = Math.log10(num);
                else if (fn === 'ln') result = Math.log(num);
                else if (fn === 'sqrt') result = Math.sqrt(num);
                else if (fn === '^') {
                    previousValue = displayValue;
                    operator = '^';
                    exprEl.textContent = `${displayValue} ^`;
                    displayValue = '0';
                    updateDisplay();
                    return;
                }
                displayValue = result.toFixed(6).replace(/0+$/, '').replace(/\.$/, '');
                updateDisplay();
            } catch(e) {
                displayValue = 'Error';
                setTimeout(() => { displayValue = '0'; updateDisplay(); }, 1200);
            }
        }

        function toggleAngle() {
            isDegree = !isDegree;
            document.getElementById('angleBtn').textContent = isDegree ? 'DEG' : 'RAD';
        }

        function calculateResult() {
            if (!operator) return;
            try {
                let a = parseFloat(previousValue);
                let b = parseFloat(displayValue);
                let result;
                if (operator === '^') result = Math.pow(a, b);
                else result = math.evaluate(`${a}${operator}${b}`);
                displayValue = result.toString();
                exprEl.textContent = '';
                operator = '';
                updateDisplay();
            } catch(e) {
                displayValue = '¡Error! 💔';
                setTimeout(() => { displayValue = '0'; updateDisplay(); }, 1500);
            }
        }

        function plotCurrentFunction() {
            const input = document.getElementById('functionInput').value.trim() || 'sin(x)';
            const canvas = document.getElementById('graphCanvas');
            
            if (!chart) {
                chart = new Chart(canvas, {
                    type: 'line',
                    data: { labels: [], datasets: [{ borderColor: '#c026d3', borderWidth: 3.5, tension: 0.35, pointRadius: 0 }] },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { grid: { color: '#e0e7ff' }, ticks: { color: '#a1a1aa' } },
                            x: { grid: { color: '#e0e7ff' }, ticks: { color: '#a1a1aa' } }
                        }
                    }
                });
            }
            
            const labels = [];
            const values = [];
            for (let x = -8; x <= 8; x += 0.12) {
                try {
                    const y = math.evaluate(input.replace(/x/g, x));
                    if (isFinite(y) && Math.abs(y) < 100) {
                        labels.push(x.toFixed(1));
                        values.push(y);
                    }
                } catch(e) {}
            }
            
            chart.data.labels = labels;
            chart.data.datasets[0].data = values;
            chart.data.datasets[0].label = input;
            chart.update();
        }

        // Init
        updateDisplay();
        plotCurrentFunction(); // show default graph
        
        console.log('%c💃 Belinda Calc Pro v1.2.0 ready for phones in any orientation!', 'color:#db2777; font-weight:600');
    </script>
</body>
</html>
