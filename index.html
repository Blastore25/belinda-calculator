<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belinda Calc Pro 💃✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/13.2.0/math.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ec4899">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display:wght@700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
        }
        .title {
            font-family: 'Playfair Display', cursive;
        }
        .display {
            font-size: 2.25rem;
            background: linear-gradient(135deg, #4c1d95, #831843);
        }
        .btn {
            transition: all 0.15s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        .btn:active {
            transform: scale(0.85) rotate(6deg);
        }
        .tab {
            transition: all 0.2s;
        }
        .graph-container {
            height: 260px;
        }
        .sparkle {
            animation: sparkle 2s infinite;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-200 via-purple-200 to-violet-300 min-h-screen pb-8">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-pink-400">
        <!-- Header -->
        <div class="bg-gradient-to-r from-pink-500 to-purple-600 text-white p-5 flex items-center gap-3">
            <div class="w-11 h-11 bg-white rounded-2xl flex items-center justify-center text-4xl sparkle">💃</div>
            <div>
                <h1 class="title text-3xl font-bold">Belinda Calc Pro</h1>
                <p class="text-pink-100 text-xs">v1.1.0 • Scientific & Graphs • Made with love</p>
            </div>
        </div>

        <!-- Mode Tabs -->
        <div class="flex border-b border-pink-200 bg-white">
            <button onclick="switchMode(0)" id="tab-0" class="tab flex-1 py-4 text-center font-semibold text-pink-500 border-b-4 border-pink-500">Basic</button>
            <button onclick="switchMode(1)" id="tab-1" class="tab flex-1 py-4 text-center font-semibold text-purple-400">Scientific</button>
            <button onclick="switchMode(2)" id="tab-2" class="tab flex-1 py-4 text-center font-semibold text-purple-400">Graph</button>
        </div>

        <!-- Display -->
        <div class="p-6 bg-gradient-to-b from-slate-900 to-black">
            <div id="display" class="display h-20 rounded-2xl p-5 text-right text-white font-mono text-4xl shadow-inner flex items-center justify-end overflow-hidden">
                0
            </div>
            <div id="expression" class="text-pink-300 text-right text-sm h-8 mt-2 font-light"></div>
        </div>

        <!-- Basic Calculator -->
        <div id="panel-0" class="calculator-panel p-6">
            <!-- Same cute basic layout as before (shortened for brevity) -->
            <div class="grid grid-cols-4 gap-3">
                <!-- Basic buttons here - keeping the original cute style -->
                <button onclick="handleInput('C')" class="btn h-14 text-xl font-bold bg-red-100 hover:bg-red-200 text-red-600 rounded-3xl">C</button>
                <button onclick="handleInput('(')" class="btn h-14 text-2xl font-bold bg-slate-100 hover:bg-slate-200 rounded-3xl">(</button>
                <button onclick="handleInput(')')" class="btn h-14 text-2xl font-bold bg-slate-100 hover:bg-slate-200 rounded-3xl">)</button>
                <button onclick="handleInput('/')" class="btn h-14 text-3xl font-bold bg-purple-500 text-white rounded-3xl">÷</button>
                
                <!-- More buttons... (full implementation would continue here) -->
                <button onclick="handleInput('7')" class="btn h-16 text-4xl font-semibold bg-white border border-slate-200 rounded-3xl">7</button>
                <button onclick="handleInput('8')" class="btn h-16 text-4xl font-semibold bg-white border border-slate-200 rounded-3xl">8</button>
                <button onclick="handleInput('9')" class="btn h-16 text-4xl font-semibold bg-white border border-slate-200 rounded-3xl">9</button>
                <button onclick="handleInput('*')" class="btn h-16 text-4xl font-bold bg-purple-500 text-white rounded-3xl">×</button>
                
                <button onclick="handleInput('4')" class="btn h-16 text-4xl font-semibold bg-white border border-slate-200 rounded-3xl">4</button>
                <button onclick="handleInput('5')" class="btn h-16 text-4xl font-semibold bg-white border border-slate-200 rounded-3xl">5</button>
                <button onclick="handleInput('6')" class="btn h-16 text-4xl font-semibold bg-white border border-slate-200 rounded-3xl">6</button>
                <button onclick="handleInput('-')" class="btn h-16 text-5xl font-bold bg-purple-500 text-white rounded-3xl">−</button>
                
                <button onclick="handleInput('1')" class="btn h-16 text-4xl font-semibold bg-white border border-slate-200 rounded-3xl">1</button>
                <button onclick="handleInput('2')" class="btn h-16 text-4xl font-semibold bg-white border border-slate-200 rounded-3xl">2</button>
                <button onclick="handleInput('3')" class="btn h-16 text-4xl font-semibold bg-white border border-slate-200 rounded-3xl">3</button>
                <button onclick="handleInput('+')" class="btn h-16 text-4xl font-bold bg-purple-500 text-white rounded-3xl">+</button>
                
                <button onclick="handleInput('0')" class="btn col-span-2 h-16 text-4xl font-semibold bg-white border border-slate-200 rounded-3xl">0</button>
                <button onclick="handleInput('.')" class="btn h-16 text-5xl font-semibold bg-white border border-slate-200 rounded-3xl">.</button>
                <button onclick="calculate()" class="btn h-16 text-4xl font-bold bg-gradient-to-r from-pink-500 to-purple-600 text-white rounded-3xl shadow-lg">💖</button>
            </div>
        </div>

        <!-- Scientific Panel -->
        <div id="panel-1" class="calculator-panel hidden p-6">
            <div class="grid grid-cols-4 gap-3 text-lg">
                <button onclick="handleInput('sin')" class="btn h-14 bg-purple-100 text-purple-700 rounded-3xl">sin</button>
                <button onclick="handleInput('cos')" class="btn h-14 bg-purple-100 text-purple-700 rounded-3xl">cos</button>
                <button onclick="handleInput('tan')" class="btn h-14 bg-purple-100 text-purple-700 rounded-3xl">tan</button>
                <button onclick="toggleAngleMode()" id="angle-mode" class="btn h-14 bg-amber-100 text-amber-700 rounded-3xl">DEG</button>
                <!-- More scientific buttons would go here: log, ln, ^, sqrt, !, pi, e, etc. -->
                <button onclick="handleInput('log')" class="btn h-14 bg-purple-100 text-purple-700 rounded-3xl">log</button>
                <button onclick="handleInput('ln')" class="btn h-14 bg-purple-100 text-purple-700 rounded-3xl">ln</button>
                <button onclick="handleInput('sqrt')" class="btn h-14 bg-purple-100 text-purple-700 rounded-3xl">√</button>
                <button onclick="handleInput('^')" class="btn h-14 bg-purple-100 text-purple-700 rounded-3xl">x^y</button>
            </div>
        </div>

        <!-- Graph Panel -->
        <div id="panel-2" class="calculator-panel hidden p-6">
            <div class="graph-container bg-slate-50 rounded-3xl p-4 mb-6">
                <canvas id="graphCanvas"></canvas>
            </div>
            <div class="flex gap-3">
                <input id="functionInput" type="text" value="sin(x)" 
                       class="flex-1 px-5 py-4 rounded-3xl border border-purple-200 focus:outline-none focus:border-pink-400 text-lg">
                <button onclick="plotFunction()" 
                        class="px-8 bg-gradient-to-r from-pink-500 to-purple-600 text-white font-bold rounded-3xl">Plot</button>
            </div>
            <p class="text-center text-xs text-purple-400 mt-4">Try: sin(x), x^2, 2^x, cos(2*x)</p>
        </div>

        <!-- Footer -->
        <div class="text-center py-6 text-xs text-purple-300">
            Belinda Calc Pro v1.1.0 • Made with glitter & math 💖
        </div>
    </div>

    <script>
        let currentMode = 0;
        let displayValue = '0';
        let isDegreeMode = true;
        let chartInstance = null;

        const display = document.getElementById('display');
        const expression = document.getElementById('expression');

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.calculator-panel').forEach(p => p.classList.add('hidden'));
            document.getElementById(`panel-${mode}`).classList.remove('hidden');
            
            document.querySelectorAll('.tab').forEach((tab, i) => {
                if (i === mode) {
                    tab.classList.add('border-b-4', 'border-pink-500', 'text-pink-500');
                } else {
                    tab.classList.remove('border-b-4', 'border-pink-500', 'text-pink-500');
                }
            });
        }

        function handleInput(value) {
            if (displayValue === '0' && !['+', '-', '*', '/'].includes(value)) {
                displayValue = value;
            } else {
                displayValue += value;
            }
            display.textContent = displayValue;
        }

        function calculate() {
            try {
                let result = math.evaluate(displayValue);
                displayValue = result.toString();
                display.textContent = displayValue;
            } catch(e) {
                display.textContent = '¡Error! 💔';
                setTimeout(() => { displayValue = '0'; display.textContent = '0'; }, 1500);
            }
        }

        function toggleAngleMode() {
            isDegreeMode = !isDegreeMode;
            document.getElementById('angle-mode').textContent = isDegreeMode ? 'DEG' : 'RAD';
        }

        function plotFunction() {
            const input = document.getElementById('functionInput');
            let funcStr = input.value.trim() || 'sin(x)';
            const canvas = document.getElementById('graphCanvas');
            
            if (!chartInstance) {
                chartInstance = new Chart(canvas, {
                    type: 'line',
                    data: { labels: [], datasets: [{ label: funcStr, borderColor: '#ec4899', borderWidth: 3, tension: 0.4, pointRadius: 0 }] },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        plugins: { legend: { display: true, position: 'top' } },
                        scales: { y: { grid: { color: '#e0e7ff' } }, x: { grid: { color: '#e0e7ff' } } }
                    }
                });
            }
            
            const labels = [];
            const data = [];
            const step = 0.15;
            for (let x = -10; x <= 10; x += step) {
                try {
                    let expr = funcStr.replace(/x/g, `(${x})`);
                    const y = math.evaluate(expr);
                    if (isFinite(y)) {
                        labels.push(x.toFixed(1));
                        data.push(y);
                    }
                } catch(e) {}
            }
            
            if (data.length > 5) {
                chartInstance.data.labels = labels;
                chartInstance.data.datasets[0].data = data;
                chartInstance.data.datasets[0].label = funcStr;
                chartInstance.update();
                input.style.borderColor = '#a5b4fc';
            } else {
                input.style.borderColor = '#f43f5e';
                setTimeout(() => input.style.borderColor = '#a5b4fc', 2000);
            }
        }

        // Keyboard support
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') calculate();
            if (e.key === 'Escape') { displayValue = '0'; display.textContent = '0'; }
        });

        // Initialize
        switchMode(0);
        display.textContent = '0';
        
        console.log('%c💃 Belinda Calc Pro v1.1.0 ready for smartphones!', 'color:#ec4899; font-size:13px');
    </script>
</body>
</html>
