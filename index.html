<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belinda Calc Pro v1.4.0 💃✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/13.2.0/math.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ec4899">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./icons/icon.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display:wght@700&display=swap');
        
        body { font-family: 'Poppins', sans-serif; }
        .title { font-family: 'Playfair Display', cursive; }
        
        .display {
            font-size: clamp(2.1rem, 8vw, 3rem);
            background: linear-gradient(135deg, #4c1d95, #831843);
            overflow-x: auto;
            scrollbar-width: none;
            white-space: nowrap;
        }
        .display::-webkit-scrollbar {
            display: none;
        }
        .expression {
            font-size: 0.95rem;
            min-height: 2rem;
            opacity: 0.9;
        }
        
        .btn {
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn:active {
            transform: scale(0.85) rotate(8deg);
        }
        
        .content-area {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            max-height: calc(100vh - 210px);
        }
        
        .currency-row {
            transition: all 0.2s ease;
        }
        .currency-row:hover {
            background-color: #f3e8ff;
        }
        
        .sparkle { animation: sparkle 1.8s infinite; }
        @keyframes sparkle { 0%, 100% {opacity:0.7} 50% {opacity:1} }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-200 via-purple-200 to-violet-300">
    <div class="max-w-md mx-auto bg-white shadow-2xl min-h-screen flex flex-col">
        <!-- Header -->
        <div class="bg-gradient-to-r from-pink-500 to-purple-600 text-white p-5 flex items-center gap-4 flex-shrink-0">
            <div class="text-5xl sparkle">💃</div>
            <div>
                <h1 class="title text-3xl font-bold">Belinda Calc Pro</h1>
                <p class="text-pink-100 text-sm">v1.4 • Calculator • Graph • Currency</p>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex bg-white border-b border-purple-100 flex-shrink-0 text-xs">
            <button onclick="switchTab(0)" id="tab0" class="flex-1 py-3.5 text-center font-semibold border-b-4 border-pink-500 text-pink-600">🧮 Calc</button>
            <button onclick="switchTab(1)" id="tab1" class="flex-1 py-3.5 text-center font-semibold text-purple-400">📈 Graph</button>
            <button onclick="switchTab(2)" id="tab2" class="flex-1 py-3.5 text-center font-semibold text-purple-400">💱 Rates</button>
        </div>

        <!-- Scrollable Content -->
        <div class="content-area flex-1 overflow-y-auto bg-white">
            <!-- Calculator Tab -->
            <div id="panel0" class="p-6">
                <div id="expression" class="expression text-right text-pink-200 text-sm font-light h-8 mb-1 pr-4 overflow-x-auto whitespace-nowrap"></div>
                <div id="display" class="display rounded-3xl p-8 text-right text-white font-mono shadow-inner mb-8">0</div>
                
                <div class="grid grid-cols-6 gap-2 mb-8">
                    <button onclick="sci('sin')" class="btn py-4 bg-purple-100 text-purple-700 rounded-3xl text-sm">sin</button>
                    <button onclick="sci('cos')" class="btn py-4 bg-purple-100 text-purple-700 rounded-3xl text-sm">cos</button>
                    <button onclick="sci('tan')" class="btn py-4 bg-purple-100 text-purple-700 rounded-3xl text-sm">tan</button>
                    <button onclick="sci('log')" class="btn py-4 bg-purple-100 text-purple-700 rounded-3xl text-sm">log</button>
                    <button onclick="sci('sqrt')" class="btn py-4 bg-purple-100 text-purple-700 rounded-3xl text-sm">√</button>
                    <button onclick="toggleDeg()" id="degBtn" class="btn py-4 bg-amber-100 text-amber-700 font-bold rounded-3xl text-sm">DEG</button>
                </div>
                
                <div class="grid grid-cols-4 gap-3">
                    <button onclick="input('C')" class="btn h-16 text-3xl font-bold bg-red-100 text-red-600 rounded-3xl">C</button>
                    <button onclick="backspace()" class="btn h-16 text-4xl font-bold bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-3xl">⌫</button>
                    <button onclick="input('%')" class="btn h-16 text-3xl font-bold bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-3xl">%</button>
                    <button onclick="input('/')" class="btn h-16 text-4xl bg-violet-500 text-white rounded-3xl">÷</button>
                    
                    <button onclick="input('7')" class="btn h-20 text-4xl bg-white border-2 border-slate-200 rounded-3xl">7</button>
                    <button onclick="input('8')" class="btn h-20 text-4xl bg-white border-2 border-slate-200 rounded-3xl">8</button>
                    <button onclick="input('9')" class="btn h-20 text-4xl bg-white border-2 border-slate-200 rounded-3xl">9</button>
                    <button onclick="input('*')" class="btn h-20 text-4xl bg-violet-500 text-white rounded-3xl">×</button>
                    
                    <button onclick="input('4')" class="btn h-20 text-4xl bg-white border-2 border-slate-200 rounded-3xl">4</button>
                    <button onclick="input('5')" class="btn h-20 text-4xl bg-white border-2 border-slate-200 rounded-3xl">5</button>
                    <button onclick="input('6')" class="btn h-20 text-4xl bg-white border-2 border-slate-200 rounded-3xl">6</button>
                    <button onclick="input('-')" class="btn h-20 text-5xl bg-violet-500 text-white rounded-3xl">−</button>
                    
                    <button onclick="input('1')" class="btn h-20 text-4xl bg-white border-2 border-slate-200 rounded-3xl">1</button>
                    <button onclick="input('2')" class="btn h-20 text-4xl bg-white border-2 border-slate-200 rounded-3xl">2</button>
                    <button onclick="input('3')" class="btn h-20 text-4xl bg-white border-2 border-slate-200 rounded-3xl">3</button>
                    <button onclick="input('+')" class="btn h-20 text-4xl bg-violet-500 text-white rounded-3xl">+</button>
                    
                    <button onclick="input('0')" class="btn col-span-2 h-20 text-4xl bg-white border-2 border-slate-200 rounded-3xl">0</button>
                    <button onclick="input('.')" class="btn h-20 text-5xl bg-white border-2 border-slate-200 rounded-3xl">.</button>
                    <button onclick="equals()" class="btn h-20 text-5xl bg-gradient-to-br from-pink-500 to-purple-600 text-white rounded-3xl shadow-xl">💖</button>
                </div>
            </div>

            <!-- Graph Tab -->
            <div id="panel1" class="hidden p-6 bg-gradient-to-b from-purple-50 to-white">
                <div class="graph-container bg-white rounded-3xl p-5 border border-purple-100 shadow-inner mb-6">
                    <canvas id="graphCanvas" class="w-full h-full"></canvas>
                </div>
                <input id="graphInput" type="text" value="sin(x)" class="w-full px-6 py-5 border-2 border-purple-200 rounded-3xl focus:border-pink-400 text-lg mb-4">
                <button onclick="plotGraph()" class="w-full py-6 bg-gradient-to-r from-pink-500 to-purple-600 text-white font-bold rounded-3xl text-xl">Plot</button>
            </div>

            <!-- Currency Tab -->
            <div id="panel2" class="hidden p-6 bg-gradient-to-b from-purple-50 to-white">
                <div class="mb-6">
                    <label class="block text-purple-600 text-sm font-medium mb-2">Base Currency & Amount</label>
                    <div class="flex gap-3">
                        <select id="baseCurrency" onchange="convertCurrency()" class="bg-white border-2 border-purple-200 rounded-3xl px-5 py-4 text-lg font-medium flex-1">
                            <!-- Populated by JS -->
                        </select>
                        <input id="baseAmount" type="number" value="1" onchange="convertCurrency()" 
                               class="bg-white border-2 border-purple-200 rounded-3xl px-6 py-4 text-lg font-medium w-32 text-right">
                    </div>
                </div>
                
                <div id="conversionList" class="space-y-3">
                    <!-- Populated by JS -->
                </div>
                
                <div class="text-center text-xs text-purple-400 mt-8">
                    Live rates • Updated from trusted public API<br>
                    (MXN & BTC included 💕)
                </div>
            </div>
        </div>

        <div class="text-center py-6 text-xs text-purple-400 border-t flex-shrink-0">
            Belinda Calc Pro v1.4 • With Currency Converter
        </div>
    </div>

    <script>
        let currentTab = 0;
        let displayValue = '0';
        let isDeg = true;
        let chart = null;
        let exchangeRates = {};
        let currencies = [
            {code: 'USD', name: 'US Dollar', flag: '🇺🇸'},
            {code: 'EUR', name: 'Euro', flag: '🇪🇺'},
            {code: 'JPY', name: 'Japanese Yen', flag: '🇯🇵'},
            {code: 'GBP', name: 'British Pound', flag: '🇬🇧'},
            {code: 'CNY', name: 'Chinese Yuan', flag: '🇨🇳'},
            {code: 'INR', name: 'Indian Rupee', flag: '🇮🇳'},
            {code: 'AUD', name: 'Australian Dollar', flag: '🇦🇺'},
            {code: 'CAD', name: 'Canadian Dollar', flag: '🇨🇦'},
            {code: 'CHF', name: 'Swiss Franc', flag: '🇨🇭'},
            {code: 'HKD', name: 'Hong Kong Dollar', flag: '🇭🇰'},
            {code: 'SGD', name: 'Singapore Dollar', flag: '🇸🇬'},
            {code: 'SEK', name: 'Swedish Krona', flag: '🇸🇪'},
            {code: 'KRW', name: 'South Korean Won', flag: '🇰🇷'},
            {code: 'NOK', name: 'Norwegian Krone', flag: '🇳🇴'},
            {code: 'MXN', name: 'Mexican Peso', flag: '🇲🇽'},
            {code: 'RUB', name: 'Russian Ruble', flag: '🇷🇺'},
            {code: 'ZAR', name: 'South African Rand', flag: '🇿🇦'},
            {code: 'TRY', name: 'Turkish Lira', flag: '🇹🇷'},
            {code: 'BRL', name: 'Brazilian Real', flag: '🇧🇷'},
            {code: 'BTC', name: 'Bitcoin', flag: '₿'}
        ];

        function switchTab(n) {
            currentTab = n;
            document.getElementById('panel0').classList.toggle('hidden', n !== 0);
            document.getElementById('panel1').classList.toggle('hidden', n !== 1);
            document.getElementById('panel2').classList.toggle('hidden', n !== 2);
            
            document.getElementById('tab0').classList.toggle('border-b-4', n === 0);
            document.getElementById('tab0').classList.toggle('text-pink-600', n === 0);
            document.getElementById('tab1').classList.toggle('border-b-4', n === 1);
            document.getElementById('tab1').classList.toggle('text-pink-600', n === 1);
            document.getElementById('tab2').classList.toggle('border-b-4', n === 2);
            document.getElementById('tab2').classList.toggle('text-pink-600', n === 2);
            
            if (n === 2 && Object.keys(exchangeRates).length === 0) {
                fetchCurrencyRates();
            }
        }

        // Calculator functions (same as before)
        function input(v) {
            if (v === 'C') displayValue = '0';
            else if (displayValue === '0' && v !== '.') displayValue = v;
            else displayValue += v;
            document.getElementById('display').textContent = displayValue;
        }

        function sci(op) {
            let n = parseFloat(displayValue) || 0;
            let r = 0;
            if (op === 'sin') r = isDeg ? Math.sin(n * Math.PI/180) : Math.sin(n);
            if (op === 'cos') r = isDeg ? Math.cos(n * Math.PI/180) : Math.cos(n);
            if (op === 'tan') r = isDeg ? Math.tan(n * Math.PI/180) : Math.tan(n);
            if (op === 'log') r = Math.log10(n);
            if (op === 'sqrt') r = Math.sqrt(n);
            displayValue = r.toFixed(6).replace(/0+$/,'').replace(/\.$/,'');
            document.getElementById('display').textContent = displayValue;
        }

        function backspace() {
            if (displayValue.length <= 1 || displayValue === 'Error 💔') {
                displayValue = '0';
            } else {
                displayValue = displayValue.slice(0, -1);
            }
            document.getElementById('display').textContent = displayValue;
        }

        function toggleDeg() {
            isDeg = !isDeg;
            document.getElementById('degBtn').textContent = isDeg ? 'DEG' : 'RAD';
        }

        function equals() {
            try {
                displayValue = math.evaluate(displayValue).toString();
                document.getElementById('display').textContent = displayValue;
            } catch(e) {
                document.getElementById('display').textContent = 'Error 💔';
                setTimeout(() => document.getElementById('display').textContent = '0', 1400);
            }
        }

        function plotGraph() {
            const expr = document.getElementById('graphInput').value || 'sin(x)';
            const canvas = document.getElementById('graphCanvas');
            if (!chart) {
                chart = new Chart(canvas, {
                    type: 'line',
                    data: { labels: [], datasets: [{ borderColor: '#c026d3', borderWidth: 4, tension: 0.5, pointRadius: 0 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });
            }
            let labels = [], values = [];
            for (let x = -10; x <= 10; x += 0.1) {
                try {
                    const y = math.evaluate(expr.replace(/x/g, `(${x})`));
                    if (isFinite(y)) {
                        labels.push(x.toFixed(1));
                        values.push(y);
                    }
                } catch(e) {}
            }
            chart.data.labels = labels;
            chart.data.datasets[0].data = values;
            chart.data.datasets[0].label = expr;
            chart.update();
        }

        // Currency Converter
        async function fetchCurrencyRates() {
            const base = 'usd';
            try {
                const res = await fetch(`https://latest.currency-api.pages.dev/v1/currencies/${base}.json`);
                const data = await res.json();
                exchangeRates = data[base];
                // Add BTC manually (approximate, for demo)
                exchangeRates.btc = 0.000017; // ~1 USD = 0.000017 BTC (live rate changes)
                populateBaseSelector();
                convertCurrency();
            } catch(e) {
                console.error('Rate fetch failed, using demo rates', e);
                exchangeRates = {eur: 0.92, jpy: 152, gbp: 0.79, mxn: 20.5, btc: 0.000017};
                populateBaseSelector();
                convertCurrency();
            }
        }

        function populateBaseSelector() {
            const select = document.getElementById('baseCurrency');
            select.innerHTML = '';
            currencies.forEach(curr => {
                const option = document.createElement('option');
                option.value = curr.code.toLowerCase();
                option.textContent = `${curr.flag} ${curr.code} - ${curr.name}`;
                select.appendChild(option);
            });
            select.value = 'usd';
        }

        function convertCurrency() {
            const baseSelect = document.getElementById('baseCurrency');
            const amount = parseFloat(document.getElementById('baseAmount').value) || 1;
            const baseCode = baseSelect.value;
            
            const list = document.getElementById('conversionList');
            list.innerHTML = '';
            
            currencies.forEach(curr => {
                if (curr.code.toLowerCase() === baseCode) return;
                
                const rate = exchangeRates[curr.code.toLowerCase()] || 1;
                const converted = (amount * rate).toFixed(4);
                
                const div = document.createElement('div');
                div.className = 'currency-row flex justify-between items-center bg-white p-5 rounded-3xl border border-purple-100';
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="text-3xl">${curr.flag}</span>
                        <div>
                            <div class="font-semibold">${curr.code}</div>
                            <div class="text-xs text-purple-400">${curr.name}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="font-mono text-xl font-semibold text-purple-700">${converted}</div>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        // Init
        document.getElementById('display').textContent = '0';
        switchTab(0);
        setTimeout(() => plotGraph(), 400);
        
        console.log('%c💃 v1.4 with beautiful Currency tab is ready! Live rates from trusted API.', 'color:#c026d3; font-weight:600');
    </script>
</body>
</html>
